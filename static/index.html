<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutonDB</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent-dim: #3d3578;
      --accent-glow: rgba(124, 106, 247, 0.15);
      --green: #3ddc84;
      --red: #ff5f6d;
      --text: #e2e2f0;
      --muted: #6b6b80;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #auth-status {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    #auth-status.logged-in { color: var(--green); }

    .btn-logout {
      font-family: var(--mono);
      font-size: 0.75rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      display: none;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .app {
      display: flex;
      flex: 1;
      height: calc(100vh - 56px);
    }

    nav {
      width: 200px;
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      flex-shrink: 0;
    }

    .nav-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 1.25rem 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 1.25rem;
      font-size: 0.875rem;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }

    .nav-item:hover { color: var(--text); background: var(--surface); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); }

    .nav-icon { font-size: 0.9rem; width: 16px; text-align: center; }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .panel-title {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .field { margin-bottom: 0.875rem; }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 8px 20px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 600;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6a59e0; }

    .response-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1rem;
      min-height: 48px;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }

    .response-box.show { display: block; }
    .response-box.success { color: var(--green); border-color: rgba(61,220,132,0.3); }
    .response-box.error { color: var(--red); border-color: rgba(255,95,109,0.3); }

    .query-result {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      margin-top: 1rem;
      display: none;
    }
    .query-result.show { display: block; }
    .result-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .result-value {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--green);
      word-break: break-all;
    }

    #auth-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      width: 360px;
    }

    .auth-logo {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .auth-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .auth-tab {
      flex: 1;
      padding: 7px;
      font-family: var(--mono);
      font-size: 0.75rem;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      transition: all 0.15s;
    }

    .auth-tab.active { background: var(--accent); color: #fff; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 20px;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.2s;
      z-index: 999;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    AutonDB
  </div>
  <div class="header-right">
    <span id="auth-status">not connected</span>
    <button class="btn-logout" id="btn-logout" onclick="logout()">logout</button>
  </div>
</header>

<div id="auth-gate">
  <div class="auth-box">
    <div class="auth-logo">AutonDB</div>
    <div class="auth-sub">AI-native credential store. Self-hosted, free, yours.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
    </div>
    <div class="field" id="email-field" style="display:none">
      <label>Email</label>
      <input id="auth-email" type="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Username</label>
      <input id="auth-username" type="text" placeholder="user" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="auth-password" type="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="doAuth()">Connect</button>
    <div class="response-box" id="auth-response"></div>
  </div>
</div>

<div class="app" id="main-app" style="display:none">
  <nav>
    <div class="nav-label">AutonDB</div>
    <div class="nav-item active" onclick="showPanel('query', this)">
      <span class="nav-icon">⚡</span> Query
    </div>
    <div class="nav-item" onclick="showPanel('store', this)">
      <span class="nav-icon">＋</span> Store Key
    </div>
    <div class="nav-item" onclick="showPanel('fetch', this)">
      <span class="nav-icon">↓</span> Fetch by ID
    </div>
  </nav>

  <main>
    <div class="panel active" id="panel-query">
      <div class="panel-title">// natural language query</div>
      <div class="card">
        <div class="card-title">⚡ Ask for a key in plain English</div>
        <div class="field">
          <label>Query</label>
          <input id="query-input" type="text" placeholder="give me the stripe production key" onkeydown="if(event.key==='Enter')doQuery()" />
        </div>
        <button class="btn btn-primary" onclick="doQuery()">Resolve</button>
        <div class="query-result" id="query-result">
          <div class="result-label">Matched key</div>
          <div class="result-value" id="query-value"></div>
          <hr class="divider">
          <div class="result-label">Record ID</div>
          <div class="result-value" id="query-id" style="color:var(--muted);font-size:0.75rem"></div>
        </div>
        <div class="response-box" id="query-response"></div>
      </div>
    </div>

    <div class="panel" id="panel-store">
      <div class="panel-title">// store a new key</div>
      <div class="card">
        <div class="card-title">＋ New credential</div>
        <div class="grid-2">
          <div class="field">
            <label>Name</label>
            <input id="store-name" type="text" placeholder="Stripe production" />
          </div>
          <div class="field">
            <label>Service</label>
            <input id="store-service" type="text" placeholder="stripe" />
          </div>
        </div>
        <div class="field">
          <label>Tags (comma separated)</label>
          <input id="store-tags" type="text" placeholder="payments, prod, finance" />
        </div>
        <div class="field">
          <label>Key value</label>
          <input id="store-value" type="password" placeholder="sk_live_••••••••" />
        </div>
        <button class="btn btn-primary" onclick="storeKey()">Store</button>
        <div class="response-box" id="store-response"></div>
      </div>
    </div>

    <div class="panel" id="panel-fetch">
      <div class="panel-title">// fetch by record id</div>
      <div class="card">
        <div class="card-title">↓ Retrieve key by ID</div>
        <div class="field">
          <label>Record ID</label>
          <input id="fetch-id" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
        </div>
        <button class="btn btn-primary" onclick="fetchKey()">Fetch</button>
        <div class="response-box" id="fetch-response"></div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8000';
  let TOKEN = localStorage.getItem('autondb_token') || null;
  let USERNAME = localStorage.getItem('autondb_user') || null;
  let AUTH_MODE = 'login';

  if (TOKEN) showApp();

function switchAuthTab(mode) {
    AUTH_MODE = mode;
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && mode === 'login') || (i === 1 && mode === 'register'));
    });
    document.getElementById('email-field').style.display = mode === 'register' ? 'block' : 'none';
    document.querySelector('.auth-box button.btn-primary').textContent = mode === 'login' ? 'Connect' : 'Create Account';
  }
  async function doAuth() {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    if (!username || !password) return showToast('Fill in all fields', 'error');
    const endpoint = AUTH_MODE === 'login' ? '/auth/login' : '/auth/register';
    try {
      const res = await fetch(API + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showAuthResponse(data.detail || 'Error', 'error'); return; }
      if (AUTH_MODE === 'register') {
        showAuthResponse('Account created — logging you in...', 'success');
        AUTH_MODE = 'login';
        setTimeout(() => doAuth(), 800);
        return;
      }
      TOKEN = data.access_token;
      USERNAME = username;
      localStorage.setItem('autondb_token', TOKEN);
      localStorage.setItem('autondb_user', USERNAME);
      showApp();
    } catch (e) {
      showAuthResponse('Cannot reach server — is AutonDB running?', 'error');
    }
  }

  function showApp() {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    document.getElementById('auth-status').textContent = USERNAME || 'connected';
    document.getElementById('auth-status').classList.add('logged-in');
    document.getElementById('btn-logout').style.display = 'block';
  }

  function logout() {
    TOKEN = null; USERNAME = null;
    localStorage.removeItem('autondb_token');
    localStorage.removeItem('autondb_user');
    location.reload();
  }

  function showPanel(name, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    el.classList.add('active');
  }

  async function doQuery() {
    const query = document.getElementById('query-input').value.trim();
    if (!query) return;
    const res = document.getElementById('query-response');
    const result = document.getElementById('query-result');
    result.classList.remove('show');
    showBox(res, 'resolving...', '');
    try {
      const r = await fetch(API + '/query/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body: JSON.stringify({ query })
      });
      const data = await r.json();
      if (!r.ok) { showBox(res, data.detail || 'Not found', 'error'); return; }
      res.classList.remove('show');
      document.getElementById('query-value').textContent = data.value;
      document.getElementById('query-id').textContent = data.id;
      result.classList.add('show');
    } catch (e) { showBox(res, 'Server error', 'error'); }
  }

  async function storeKey() {
    const name = document.getElementById('store-name').value.trim();
    const service = document.getElementById('store-service').value.trim();
    const tags = document.getElementById('store-tags').value.split(',').map(t => t.trim()).filter(Boolean);
    const value = document.getElementById('store-value').value;
    const res = document.getElementById('store-response');
    if (!name || !service || !value) { showBox(res, 'Name, service and value are required', 'error'); return; }
    try {
      const r = await fetch(API + '/keys/store', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body: JSON.stringify({ name, service, tags, value })
      });
      const data = await r.json();
      if (!r.ok) { showBox(res, data.detail || 'Error', 'error'); return; }
      showBox(res, 'Stored ✓  ID: ' + data.id, 'success');
      document.getElementById('store-name').value = '';
      document.getElementById('store-service').value = '';
      document.getElementById('store-tags').value = '';
      document.getElementById('store-value').value = '';
    } catch (e) { showBox(res, 'Server error', 'error'); }
  }

  async function fetchKey() {
    const id = document.getElementById('fetch-id').value.trim();
    const res = document.getElementById('fetch-response');
    if (!id) return;
    try {
      const r = await fetch(API + '/keys/fetch/' + id, {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      });
      const data = await r.json();
      if (!r.ok) { showBox(res, data.detail || 'Not found', 'error'); return; }
      showBox(res, data.value, 'success');
    } catch (e) { showBox(res, 'Server error', 'error'); }
  }

  function showBox(el, msg, type) {
    el.textContent = msg;
    el.className = 'response-box show' + (type ? ' ' + type : '');
  }

  function showAuthResponse(msg, type) {
    const el = document.getElementById('auth-response');
    el.textContent = msg;
    el.className = 'response-box show' + (type ? ' ' + type : '');
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (type || '');
    setTimeout(() => t.className = '', 2500);
  }
</script>
</body>
</html>
